name: Deploy to Lightsail

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: lightsail-demo
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  STONE_IMAGE: ghcr.io/${{ github.repository }}/stone:${{ github.sha }}
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web:${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push stone
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.stone
          push: true
          tags: |
            ${{ env.STONE_IMAGE }}
            ${{ env.REGISTRY_IMAGE }}/stone:latest
          cache-from: type=gha,scope=stone
          cache-to: type=gha,mode=max,scope=stone

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            VITE_DEMO_MODE=true
          tags: |
            ${{ env.WEB_IMAGE }}
            ${{ env.REGISTRY_IMAGE }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build SSH config
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy files
        run: |
          ssh -i ~/.ssh/lightsail "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            "mkdir -p /home/${{ secrets.LIGHTSAIL_USER }}/pulse/deploy/lightsail /home/${{ secrets.LIGHTSAIL_USER }}/pulse/stone/uploads/demo"

          rsync -az --delete \
            --exclude '.lightsail' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/lightsail" \
            deploy/lightsail/ "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/${{ secrets.LIGHTSAIL_USER }}/pulse/deploy/lightsail/"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/lightsail" \
            stone/uploads/demo/ "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/${{ secrets.LIGHTSAIL_USER }}/pulse/stone/uploads/demo/"

      - name: Hash demo seed data
        run: |
          {
            sha256sum stone/internal/db/seed/demo/fixture.json
            find stone/uploads/demo -type f -print0 | sort -z | xargs -0 sha256sum
          } | sha256sum | awk '{print "DEMO_DATA_HASH="$1}' >> "$GITHUB_ENV"

      - name: Write deploy environment
        run: |
          cat > /tmp/pulse.env <<EOF
          ENV=production
          PORT=8080
          STONE_IMAGE=${STONE_IMAGE}
          WEB_IMAGE=${WEB_IMAGE}

          POSTGRES_PASSWORD=${{ secrets.PULSE_POSTGRES_PASSWORD }}
          DATABASE_URL=postgres://pulse:${{ secrets.PULSE_POSTGRES_PASSWORD }}@postgres:5432/pulse?sslmode=disable
          REDIS_URL=redis://redis:6379/0
          JWT_SECRET=${{ secrets.PULSE_JWT_SECRET }}

          DEMO_AUTH_ENABLED=true
          CORS_ORIGINS=${{ secrets.PULSE_ORIGIN }}
          WS_ORIGINS=${{ secrets.PULSE_ORIGIN }}
          AUTH_COOKIE_SECURE=false

          STORAGE_PATH=/app/uploads
          STORAGE_BASE_URL=/uploads
          UPLOAD_PUBLIC_PATH=/uploads
          STORAGE_MAX_SIZE_MB=25

          TRUSTED_PROXIES=172.16.0.0/12,127.0.0.1,::1
          RATE_LIMIT_RPS=30
          RATE_LIMIT_BURST=60
          RATE_LIMIT_FAIL_OPEN=true

          METRICS_ENABLED=false
          OLLAMA_BASE_URL=
          OLLAMA_MODEL=
          EOF
          sed -i 's/^          //' /tmp/pulse.env
          scp -i ~/.ssh/lightsail /tmp/pulse.env \
            "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/${{ secrets.LIGHTSAIL_USER }}/pulse/deploy/lightsail/.env"

      - name: Pull and restart on Lightsail
        env:
          GHCR_TOKEN: ${{ github.token }}
          SEED_DEMO_DATA: ${{ secrets.SEED_DEMO_DATA }}
        run: |
          ssh -i ~/.ssh/lightsail "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            "cat > /tmp/pulse-deploy.sh" <<'REMOTE_SCRIPT'
            set -eu
            docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            trap "docker logout ghcr.io >/dev/null 2>&1 || true" EXIT
            cd /home/${{ secrets.LIGHTSAIL_USER }}/pulse/deploy/lightsail
            docker compose pull postgres redis stone web
            docker compose --profile ops run --rm migrate
            if [ "${SEED_DEMO_DATA:-false}" = "true" ]; then
              if [ ! -f .seeded.hash ] || [ "$(cat .seeded.hash)" != "${DEMO_DATA_HASH}" ]; then
                docker compose --profile ops run --rm seed
                printf '%s\n' "${DEMO_DATA_HASH}" > .seeded.hash
              fi
            fi
            docker compose up -d stone web
            docker image prune -f >/dev/null 2>&1 || true
          REMOTE_SCRIPT
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/lightsail "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            "SEED_DEMO_DATA='${SEED_DEMO_DATA:-false}' DEMO_DATA_HASH='${DEMO_DATA_HASH}' GHCR_ACTOR='${{ github.actor }}' bash /tmp/pulse-deploy.sh"

      - name: Health check
        run: |
          curl --fail --retry 20 --retry-delay 5 --retry-connrefused "${{ secrets.PULSE_ORIGIN }}/api/v1/health"
