name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stone:
    name: Stone (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: stone/go.mod
          cache: true
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
      - name: Go build
        run: go build -o /dev/null ./cmd/server

  ember:
    name: Ember (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ember
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ember/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  grove:
    name: Grove (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grove
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: grove/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  stone-security:
    name: Stone (security)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: stone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: stone/go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  nix:
    name: Nix flake checks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        flake:
          - stone
          - ember
          - grove
          - roots
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Check ${{ matrix.flake }} flake
        run: nix flake check ./${{ matrix.flake }} --no-build

  npm-audit:
    name: NPM audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        package:
          - ember
          - grove
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
