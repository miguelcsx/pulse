services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ${STONE_IMAGE}
    profiles: ["ops"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/migrate", "up"]

  seed:
    image: ${STONE_IMAGE}
    profiles: ["ops"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../stone/uploads:/app/uploads
    command: ["/app/seed", "--reset"]

  stone:
    image: ${STONE_IMAGE}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../stone/uploads:/app/uploads
    expose:
      - "8080"

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - stone
    ports:
      - "80:80"
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
